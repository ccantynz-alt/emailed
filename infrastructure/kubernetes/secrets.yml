# ─── AlecRae Platform Secrets ────────────────────────────────────────────────
# IMPORTANT: This file contains PLACEHOLDER values only.
# Never commit real secrets to version control.
#
# In production, use one of:
#   - AWS Secrets Manager with External Secrets Operator
#   - HashiCorp Vault with the Vault CSI Provider
#   - Sealed Secrets (Bitnami)
#
# To create this secret manually:
#   kubectl create secret generic alecrae-secrets \
#     --namespace alecrae \
#     --from-literal=DATABASE_URL='postgres://...' \
#     --from-literal=REDIS_URL='redis://...' \
#     ...
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: alecrae-secrets
  namespace: alecrae
  labels:
    app.kubernetes.io/name: alecrae-secrets
    app.kubernetes.io/part-of: alecrae-platform
  annotations:
    description: "Platform-wide secrets — replace placeholders before applying"
    kubernetes.io/description: "Contains database credentials, API keys, and service secrets"
type: Opaque
stringData:
  # ─── Database ────────────────────────────────────────────────────────────
  # Replace with actual RDS/PostgreSQL connection string
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgres://alecrae:REPLACE_ME@postgres.alecrae.svc.cluster.local:5432/alecrae"

  # ─── Redis ───────────────────────────────────────────────────────────────
  REDIS_PASSWORD: "REPLACE_ME"
  REDIS_URL: "redis://:REPLACE_ME@redis.alecrae.svc.cluster.local:6379"

  # ─── ClickHouse ──────────────────────────────────────────────────────────
  CLICKHOUSE_PASSWORD: "REPLACE_ME"

  # ─── Meilisearch ─────────────────────────────────────────────────────────
  MEILI_MASTER_KEY: "REPLACE_ME"

  # ─── S3 / Object Storage ────────────────────────────────────────────────
  S3_ACCESS_KEY: "REPLACE_ME"
  S3_SECRET_KEY: "REPLACE_ME"

  # ─── Authentication ─────────────────────────────────────────────────────
  # Generate with: openssl rand -base64 64
  JWT_SECRET: "REPLACE_ME"
  # OIDC client secret for OAuth2 provider
  OIDC_CLIENT_SECRET: "REPLACE_ME"

  # ─── AI / Claude API ────────────────────────────────────────────────────
  ANTHROPIC_API_KEY: "REPLACE_ME"

  # ─── DKIM ───────────────────────────────────────────────────────────────
  # Base64-encoded DKIM private key
  DKIM_PRIVATE_KEY: "REPLACE_ME"

  # ─── Encryption ─────────────────────────────────────────────────────────
  # Master encryption key for at-rest encryption
  # Generate with: openssl rand -base64 32
  ENCRYPTION_KEY: "REPLACE_ME"
