# ─── PodDisruptionBudgets ─────────────────────────────────────────────────────
# Ensure minimum availability during voluntary disruptions (node drains,
# cluster upgrades, etc.).
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: emailed
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: emailed-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api

