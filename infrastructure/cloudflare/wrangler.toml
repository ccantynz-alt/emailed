# AlecRae.com — Cloudflare Pages Configuration
# Deploy the web app (apps/web) to Cloudflare Pages

name = "alecrae-web"
compatibility_date = "2025-01-01"

# Pages-specific settings
pages_build_output_dir = "apps/web/.next"

[vars]
NEXT_PUBLIC_API_URL = "https://api.alecrae.com"
NEXT_PUBLIC_APP_NAME = "AlecRae"
NEXT_PUBLIC_APP_URL = "https://mail.alecrae.com"
NODE_ENV = "production"

# Custom domains (configure in Cloudflare Pages dashboard)
# - alecrae.com (landing/marketing)
# - mail.alecrae.com (email app)
# - admin.alecrae.com (admin dashboard)
