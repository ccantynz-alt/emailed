# Vienna.com — Cloudflare Pages Configuration
# Deploy the web app (apps/web) to Cloudflare Pages

name = "vienna-web"
compatibility_date = "2025-01-01"

# Pages-specific settings
pages_build_output_dir = "apps/web/.next"

[vars]
NEXT_PUBLIC_API_URL = "https://api.48co.ai"
NEXT_PUBLIC_APP_NAME = "Vienna"
NEXT_PUBLIC_APP_URL = "https://mail.48co.ai"
NODE_ENV = "production"

# Custom domains (configure in Cloudflare Pages dashboard)
# - 48co.ai (landing/marketing)
# - mail.48co.ai (email app)
# - admin.48co.ai (admin dashboard)
