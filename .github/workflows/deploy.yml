name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

jobs:
  build-images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [web, api, mta]
        include:
          - image: web
            context: ./apps/web
            dockerfile: ./infrastructure/docker/web.Dockerfile
          - image: api
            context: ./apps/api
            dockerfile: ./infrastructure/docker/api.Dockerfile
          - image: mta
            context: ./services/mta
            dockerfile: ./infrastructure/docker/mta.Dockerfile
    outputs:
      web-tag: ${{ steps.meta.outputs.tags }}
      api-tag: ${{ steps.meta.outputs.tags }}
      mta-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/alecrae-${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-images
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name alecrae-cluster --region ${{ env.AWS_REGION }}

      - name: Deploy to staging
        run: |
          echo "Deploying to staging with image tag: ${{ github.sha }}"
          kubectl set image deployment/alecrae-web web=${{ env.ECR_REGISTRY }}/alecrae-web:${{ github.sha }} --namespace=staging
          kubectl set image deployment/alecrae-api api=${{ env.ECR_REGISTRY }}/alecrae-api:${{ github.sha }} --namespace=staging
          kubectl set image deployment/alecrae-mta mta=${{ env.ECR_REGISTRY }}/alecrae-mta:${{ github.sha }} --namespace=staging

          echo "Waiting for rollouts..."
          kubectl rollout status deployment/alecrae-web --namespace=staging --timeout=300s
          kubectl rollout status deployment/alecrae-api --namespace=staging --timeout=300s
          kubectl rollout status deployment/alecrae-mta --namespace=staging --timeout=300s

      - name: Verify staging deployment
        run: |
          STAGING_URL=$(kubectl get svc alecrae-api -n staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Running health check against $STAGING_URL..."

          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "http://${STAGING_URL}/health" | jq -r '.status' 2>/dev/null || echo "unreachable")
            if [ "$STATUS" = "ok" ]; then
              echo "Staging health check passed!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Staging health check failed after 5 attempts"
          exit 1

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name alecrae-cluster --region ${{ env.AWS_REGION }}

      - name: Deploy to production
        run: |
          echo "Deploying to production with image tag: ${{ github.sha }}"
          kubectl set image deployment/alecrae-web web=${{ env.ECR_REGISTRY }}/alecrae-web:${{ github.sha }} --namespace=production
          kubectl set image deployment/alecrae-api api=${{ env.ECR_REGISTRY }}/alecrae-api:${{ github.sha }} --namespace=production
          kubectl set image deployment/alecrae-mta mta=${{ env.ECR_REGISTRY }}/alecrae-mta:${{ github.sha }} --namespace=production

          echo "Waiting for rollouts..."
          kubectl rollout status deployment/alecrae-web --namespace=production --timeout=300s
          kubectl rollout status deployment/alecrae-api --namespace=production --timeout=300s
          kubectl rollout status deployment/alecrae-mta --namespace=production --timeout=300s

      - name: Verify production deployment
        run: |
          PROD_URL=$(kubectl get svc alecrae-api -n production -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Running health check against $PROD_URL..."

          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "http://${PROD_URL}/health" | jq -r '.status' 2>/dev/null || echo "unreachable")
            if [ "$STATUS" = "ok" ]; then
              echo "Production health check passed!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

          echo "Production health check failed after 5 attempts"
          exit 1
